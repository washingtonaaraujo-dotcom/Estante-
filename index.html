<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Minha Estante</title>
<meta name="description" content="Sua biblioteca digital pessoal — guarde PDFs e EPUBs direto no aparelho.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#16211C">
<style>
:root{
  --fundo:#16211C;
  --fundo-2:#1D2B25;
  --papel:#EFE7D5;
  --papel-fraco:#B8AE97;
  --latao:#C9973F;
  --madeira:#5C4330;
  --madeira-clara:#7A5A3E;
  --perigo:#C15B4A;
  --raio:14px;
  --fonte-display:"Fraunces",Georgia,"Times New Roman",serif;
  --fonte-corpo:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--fundo);
  color:var(--papel);
  font-family:var(--fonte-corpo);
  min-height:100vh;
  padding-bottom:110px;
}
header{padding:26px 20px 10px;max-width:760px;margin:0 auto}
h1{font-family:var(--fonte-display);font-weight:600;font-size:1.9rem;letter-spacing:.01em}
h1 em{font-style:italic;color:var(--latao)}
.sub{color:var(--papel-fraco);font-size:.85rem;margin-top:4px}
.busca{margin:18px auto 0;max-width:760px;padding:0 20px}
.busca input{
  width:100%;padding:12px 16px;border-radius:var(--raio);
  border:1px solid #2C3B34;background:var(--fundo-2);
  color:var(--papel);font-size:1rem;outline:none;
}
.busca input:focus{border-color:var(--latao)}
.busca input::placeholder{color:var(--papel-fraco)}
main{max-width:760px;margin:0 auto;padding:8px 20px}
.info-espaco{color:var(--papel-fraco);font-size:.78rem;margin:10px 2px 0}
/* ---------- ESTANTE ---------- */
.prateleira{margin-top:26px;position:relative}
.livros{
  display:flex;align-items:flex-end;gap:10px;
  flex-wrap:wrap;
  padding:0 8px 0;
  min-height:60px;
}
.tabua{
  height:16px;border-radius:3px;
  background:linear-gradient(180deg,var(--madeira-clara),var(--madeira));
  box-shadow:0 6px 14px rgba(0,0,0,.45);
  margin-top:-2px;
}
/* livro com capa */
.capaLivro{
  border:none;cursor:pointer;padding:0;
  width:94px;border-radius:3px 6px 6px 3px;overflow:hidden;
  background:#26332C;
  box-shadow:2px 3px 10px rgba(0,0,0,.5), inset 3px 0 4px rgba(255,255,255,.08);
  position:relative;
  transition:transform .15s ease;
}
.capaLivro img{display:block;width:100%;height:134px;object-fit:cover}
.capaLivro:active{transform:translateY(-6px)}
@media(hover:hover){.capaLivro:hover{transform:translateY(-8px)}}
/* lombada (sem capa) */
.lombada{
  border:none;cursor:pointer;
  border-radius:4px 4px 2px 2px;
  width:44px;
  display:flex;align-items:center;justify-content:center;
  padding:10px 4px;
  box-shadow:inset -4px 0 6px rgba(0,0,0,.28), inset 2px 0 3px rgba(255,255,255,.12), 0 2px 5px rgba(0,0,0,.35);
  transition:transform .15s ease;
  position:relative;
}
.lombada:active{transform:translateY(-6px)}
@media(hover:hover){.lombada:hover{transform:translateY(-8px)}}
.lombada span{
  writing-mode:vertical-rl;
  font-family:var(--fonte-display);
  font-size:.8rem;font-weight:600;letter-spacing:.03em;
  color:rgba(255,250,238,.96);
  max-height:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  text-shadow:0 1px 2px rgba(0,0,0,.4);
}
.lombada .tipo{
  position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  writing-mode:horizontal-tb;
  font-family:var(--fonte-corpo);
  font-size:.5rem;font-weight:700;letter-spacing:.08em;
  color:rgba(255,250,238,.75);
}
.vazio{text-align:center;color:var(--papel-fraco);padding:44px 16px;font-size:.95rem;line-height:1.6}
.vazio strong{color:var(--latao)}
/* ---------- BOTÃO ADICIONAR ---------- */
.add{
  position:fixed;bottom:24px;right:22px;z-index:20;
  width:62px;height:62px;border-radius:50%;
  border:none;cursor:pointer;
  background:var(--latao);color:#221A0C;
  font-size:2rem;line-height:1;
  box-shadow:0 8px 20px rgba(0,0,0,.5);
}
.add:active{transform:scale(.94)}
.add.drive{
  bottom:98px;background:#fff;
  display:flex;align-items:center;justify-content:center;
}
.add.sync{
  bottom:172px;background:#8CC0B4;
  display:flex;align-items:center;justify-content:center;
}
.add.sync.girando svg{animation:girar 1s linear infinite}
@keyframes girar{to{transform:rotate(360deg)}}
/* ---------- MODAL ---------- */
.veu{
  position:fixed;inset:0;background:rgba(8,12,10,.72);
  display:none;align-items:flex-end;justify-content:center;z-index:30;
}
.veu.aberto{display:flex}
.painel{
  background:var(--fundo-2);width:100%;max-width:520px;
  border-radius:20px 20px 0 0;
  padding:24px 22px calc(24px + env(safe-area-inset-bottom));
  border-top:2px solid var(--latao);
  animation:sobe .2s ease;
  max-height:88vh;overflow-y:auto;
}
@keyframes sobe{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.painelTopo{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px}
.painelTopo img{
  width:72px;height:102px;object-fit:cover;border-radius:3px 5px 5px 3px;
  box-shadow:2px 3px 8px rgba(0,0,0,.5);flex-shrink:0;
}
.painel h2{font-family:var(--fonte-display);font-weight:600;font-size:1.3rem;line-height:1.3;margin-bottom:4px}
.painel .autor{color:var(--papel-fraco);font-size:.9rem;margin-bottom:6px}
.painel .meta{color:var(--papel-fraco);font-size:.78rem}
.acoes{display:grid;gap:10px}
.botao{
  padding:13px 16px;border-radius:var(--raio);border:none;cursor:pointer;
  font-size:1rem;font-weight:600;width:100%;
  background:#2C3B34;color:var(--papel);
  display:flex;align-items:center;gap:10px;justify-content:center;
}
.botao.principal{background:var(--latao);color:#221A0C}
.botao.apagar{background:transparent;color:var(--perigo);border:1px solid var(--perigo)}
.campo{margin-bottom:12px}
.campo label{display:block;font-size:.8rem;color:var(--papel-fraco);margin-bottom:5px}
.campo input{
  width:100%;padding:11px 14px;border-radius:10px;
  border:1px solid #2C3B34;background:var(--fundo);
  color:var(--papel);font-size:1rem;outline:none;
}
.campo input:focus{border-color:var(--latao)}
.fechar{margin-top:14px;background:none;border:none;color:var(--papel-fraco);width:100%;padding:10px;font-size:.9rem;cursor:pointer}
.aviso{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:var(--latao);color:#221A0C;font-weight:600;
  padding:10px 18px;border-radius:12px;font-size:.9rem;
  box-shadow:0 6px 16px rgba(0,0,0,.4);z-index:50;
  opacity:0;pointer-events:none;transition:opacity .25s;
  max-width:90vw;text-align:center;
}
.aviso.mostra{opacity:1}
input[type=file]{display:none}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
/* ---------- cabeçalho ---------- */
.cabecalho{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.btnBackup{
  flex-shrink:0;margin-top:6px;
  background:transparent;border:1px solid #2C3B34;color:var(--papel-fraco);
  border-radius:10px;padding:8px 12px;font-size:.8rem;cursor:pointer;
}
.btnBackup:active{background:#2C3B34}
/* ---------- controles (ordenar + prateleiras) ---------- */
.controles{
  max-width:760px;margin:12px auto 0;padding:0 20px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
.chips{display:flex;gap:8px;flex-wrap:wrap;flex:1;min-width:0}
.chip{
  background:var(--fundo-2);border:1px solid #2C3B34;color:var(--papel-fraco);
  border-radius:999px;padding:6px 13px;font-size:.8rem;cursor:pointer;white-space:nowrap;
}
.chip.ativo{background:var(--latao);color:#221A0C;border-color:var(--latao);font-weight:600}
#ordenar{
  background:var(--fundo-2);border:1px solid #2C3B34;color:var(--papel);
  border-radius:10px;padding:7px 10px;font-size:.82rem;cursor:pointer;flex-shrink:0;
}
/* ---------- badges de status na capa ---------- */
.capaLivro,.lombada{position:relative}
.badge{
  position:absolute;top:5px;left:5px;z-index:2;
  font-size:.55rem;font-weight:700;letter-spacing:.04em;
  padding:2px 6px;border-radius:6px;color:#fff;text-transform:uppercase;
  box-shadow:0 1px 3px rgba(0,0,0,.4);
}
.badge.lendo{background:#3E6B62}
.badge.lido{background:#4B7A3B}
.badge.quero{background:#8A6D2F}
.barraProg{
  position:absolute;left:0;right:0;bottom:0;height:4px;background:rgba(0,0,0,.35);z-index:2;
}
.barraProg i{display:block;height:100%;background:var(--latao)}
/* ---------- status no painel ---------- */
.statusLinha{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.stBtn{
  background:var(--fundo);border:1px solid #2C3B34;color:var(--papel-fraco);
  border-radius:8px;padding:6px 10px;font-size:.78rem;cursor:pointer;
}
.stBtn.ativo{background:var(--latao);color:#221A0C;border-color:var(--latao);font-weight:600}
/* ---------- LEITOR EPUB ---------- */
.leitor{position:fixed;inset:0;z-index:60;background:var(--papel);display:flex;flex-direction:column}
.leitor.escuro{background:#14100C}
.leitorBarra{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--fundo-2);color:var(--papel);flex-shrink:0;
}
.leitorTitulo{flex:1;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leitorFerramentas{display:flex;gap:6px}
.lb{
  background:#2C3B34;color:var(--papel);border:none;border-radius:8px;
  padding:8px 12px;font-size:.9rem;cursor:pointer;font-weight:600;
}
.lb:active{opacity:.7}
.lb.largo{flex:1}
.leitorArea{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.leitorRodape{
  display:flex;align-items:center;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:var(--fundo-2);color:var(--papel);flex-shrink:0;
}
.leitorProgresso{font-size:.82rem;color:var(--papel-fraco);min-width:44px;text-align:center}
</style>
</head>
<body>

<header>
  <div class="cabecalho">
    <div>
      <h1>Minha <em>Estante</em></h1>
      <p class="sub">Seus livros digitais, guardados no seu aparelho</p>
    </div>
    <button class="btnBackup" id="btnBackup" title="Baixar backup de tudo">⬇ Backup</button>
  </div>
</header>

<div class="busca">
  <input id="busca" type="search" placeholder="Buscar por título ou autor…" autocomplete="off">
  <p class="info-espaco" id="espaco"></p>
</div>

<div class="controles">
  <div class="chips" id="chips"></div>
  <select id="ordenar" aria-label="Ordenar">
    <option value="recentes">Recentes</option>
    <option value="titulo">Título A–Z</option>
    <option value="autor">Autor A–Z</option>
    <option value="status">Status</option>
  </select>
</div>

<main>
  <div class="prateleira">
    <div class="livros" id="livros"></div>
    <div class="tabua"></div>
  </div>
  <div class="vazio" id="vazio" hidden>
    Sua estante está vazia.<br>
    Toque no <strong>+</strong> pra adicionar seu primeiro PDF ou EPUB.
  </div>
</main>

<button class="add sync" id="btnSync" aria-label="Sincronizar com o Drive" title="Sincronizar entre aparelhos">
  <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#16211C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 0 1-9 9c-2.5 0-4.8-1-6.4-2.7"/><path d="M3 12a9 9 0 0 1 9-9c2.5 0 4.8 1 6.4 2.7"/><polyline points="18.5 3.5 18.5 8 14 8"/><polyline points="5.5 20.5 5.5 16 10 16"/></svg>
</button>
<button class="add drive" id="btnDrive" aria-label="Importar do Google Drive" title="Importar do Google Drive">
  <svg viewBox="0 0 87.3 78" width="26" height="26" aria-hidden="true"><path fill="#0066da" d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8H0c0 1.55.4 3.1 1.2 4.5z"/><path fill="#00ac47" d="M43.65 25L29.9 1.2c-1.35.8-2.5 1.9-3.3 3.3L1.2 48.5C.4 49.9 0 51.45 0 53h27.5z"/><path fill="#ea4335" d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.8l5.85 11.5z"/><path fill="#00832d" d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.15.45-4.5 1.2z"/><path fill="#2684fc" d="M59.8 53H27.5L13.75 76.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z"/><path fill="#ffba00" d="M73.4 26.5l-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25 59.8 53h27.45c0-1.55-.4-3.1-1.2-4.5z"/></svg>
</button>
<button class="add" id="btnAdd" aria-label="Adicionar livro do aparelho">+</button>
<input type="file" id="arquivo" accept=".pdf,.epub,application/pdf,application/epub+zip" multiple>

<!-- painel do livro -->
<div class="veu" id="veuLivro">
  <div class="painel" role="dialog" aria-modal="true">
    <div class="painelTopo">
      <img id="pCapa" alt="" hidden>
      <div>
        <h2 id="pTitulo"></h2>
        <p class="autor" id="pAutor"></p>
        <p class="meta" id="pMeta"></p>
        <div class="statusLinha" id="pStatusLinha"></div>
      </div>
    </div>
    <div class="acoes">
      <button class="botao principal" id="btnAbrir">📖 Ler</button>
      <button class="botao" id="btnBaixar">⬇️ Baixar / compartilhar</button>
      <button class="botao" id="btnEditar">✏️ Editar</button>
      <button class="botao" id="btnApagar" style="color:var(--perigo)">🗑️ Apagar</button>
    </div>
    <button class="fechar" data-fecha>Fechar</button>
  </div>
</div>

<!-- painel de edição -->
<div class="veu" id="veuEditar">
  <div class="painel" role="dialog" aria-modal="true">
    <h2 style="margin-bottom:16px">Editar livro</h2>
    <div class="campo">
      <label for="eTitulo">Título</label>
      <input id="eTitulo" type="text">
    </div>
    <div class="campo">
      <label for="eAutor">Autor</label>
      <input id="eAutor" type="text" placeholder="Opcional">
    </div>
    <div class="campo">
      <label for="eCategoria">Prateleira</label>
      <input id="eCategoria" type="text" placeholder="Ex.: Técnico, Ficção, Concurso… (opcional)" list="listaCategorias">
      <datalist id="listaCategorias"></datalist>
    </div>
    <div class="acoes">
      <button class="botao principal" id="btnSalvar">Salvar</button>
    </div>
    <button class="fechar" data-fecha>Cancelar</button>
  </div>
</div>

<!-- leitor de EPUB -->
<div class="leitor" id="leitor" hidden>
  <div class="leitorBarra">
    <button class="lb" id="leitorFechar" aria-label="Fechar leitor">✕</button>
    <span class="leitorTitulo" id="leitorTitulo"></span>
    <div class="leitorFerramentas">
      <button class="lb" id="leitorMenos" aria-label="Fonte menor">A−</button>
      <button class="lb" id="leitorMais" aria-label="Fonte maior">A+</button>
      <button class="lb" id="leitorTema" aria-label="Alternar tema">◐</button>
    </div>
  </div>
  <div class="leitorArea" id="leitorArea"></div>
  <div class="leitorRodape">
    <button class="lb largo" id="leitorAnterior">‹ Anterior</button>
    <span class="leitorProgresso" id="leitorProgresso">0%</span>
    <button class="lb largo" id="leitorProximo">Próximo ›</button>
  </div>
</div>

<div class="aviso" id="aviso"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="https://apis.google.com/js/api.js" onload="window._gapiPronto=true"></script>

const GOOGLE_API_KEY   = 'AIzaSyAOm5X9XdE7j0Ic09JMQlK4qos-7jNSuEw';

<script>
/* ================= pdf.js ================= */
if(window.pdfjsLib){
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

/* ================= IndexedDB ================= */
const DB_NOME='minha-estante', STORE='livros', META='meta';
let db;
function abrirDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NOME,2);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE))
        d.createObjectStore(STORE,{keyPath:'id',autoIncrement:true});
      if(!d.objectStoreNames.contains(META))
        d.createObjectStore(META,{keyPath:'chave'});
    };
    r.onsuccess=e=>{db=e.target.result;res()};
    r.onerror=()=>rej(r.error);
  });
}
function tx(modo){return db.transaction(STORE,modo).objectStore(STORE)}
function txM(modo){return db.transaction(META,modo).objectStore(META)}
const listar=()=>new Promise((res,rej)=>{const r=tx('readonly').getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
const salvar=l=>new Promise((res,rej)=>{const r=tx('readwrite').put(l);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
const apagar=id=>new Promise((res,rej)=>{const r=tx('readwrite').delete(id);r.onsuccess=res;r.onerror=()=>rej(r.error)});
const getMeta=chave=>new Promise(res=>{const r=txM('readonly').get(chave);r.onsuccess=()=>res(r.result?r.result.valor:null);r.onerror=()=>res(null)});
const setMeta=(chave,valor)=>new Promise(res=>{const r=txM('readwrite').put({chave,valor});r.onsuccess=()=>res();r.onerror=()=>res()});

/* ================= util ================= */
const $=s=>document.querySelector(s);
const cores=['#A6543C','#3E6B62','#8A6D2F','#5B4A78','#7A3B4E','#42633B','#3E5A78','#8C5A32'];
function corDe(t){let h=0;for(const c of t)h=(h*31+c.charCodeAt(0))>>>0;return cores[h%cores.length]}
function alturaDe(t){let h=0;for(const c of t)h=(h*17+c.charCodeAt(0))>>>0;return 150+(h%70)}
function fmtTam(b){return b<1048576?(b/1024).toFixed(0)+' KB':(b/1048576).toFixed(1)+' MB'}
function avisar(msg){const a=$('#aviso');a.textContent=msg;a.classList.add('mostra');clearTimeout(a._t);a._t=setTimeout(()=>a.classList.remove('mostra'),2600)}
function tituloDoArquivo(nome){return nome.replace(/\.(pdf|epub)$/i,'').replace(/[_-]+/g,' ').trim()}

/* ================= CAPAS ================= */
async function gerarCapa(livro){
  try{
    if(livro.tipo==='pdf'){
      if(!window.pdfjsLib)return null;
      const data=await livro.blob.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data}).promise;
      const pagina=await pdf.getPage(1);
      const vp=pagina.getViewport({scale:1});
      const escala=260/vp.width;
      const v2=pagina.getViewport({scale:escala});
      const c=document.createElement('canvas');
      c.width=v2.width;c.height=v2.height;
      const ctx=c.getContext('2d');
      ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
      await pagina.render({canvasContext:ctx,viewport:v2}).promise;
      pdf.destroy();
      return await new Promise(r=>c.toBlob(r,'image/jpeg',.82));
    }else{
      if(!window.JSZip)return null;
      const zip=await JSZip.loadAsync(livro.blob);
      const contFile=zip.file('META-INF/container.xml');
      if(!contFile)return null;
      const cont=await contFile.async('string');
      const m=cont.match(/full-path="([^"]+)"/);
      if(!m)return null;
      const opfPath=m[1];
      const opfFile=zip.file(opfPath);
      if(!opfFile)return null;
      const opf=await opfFile.async('string');
      const dir=opfPath.includes('/')?opfPath.slice(0,opfPath.lastIndexOf('/')+1):'';
      let href=null;
      const metaCover=opf.match(/<meta[^>]*name=["']cover["'][^>]*content=["']([^"']+)["']/)||opf.match(/<meta[^>]*content=["']([^"']+)["'][^>]*name=["']cover["']/);
      if(metaCover){
        const id=metaCover[1];
        const re1=new RegExp('<item[^>]*id=["\']'+id+'["\'][^>]*href=["\']([^"\']+)["\']');
        const re2=new RegExp('<item[^>]*href=["\']([^"\']+)["\'][^>]*id=["\']'+id+'["\']');
        const it=opf.match(re1)||opf.match(re2);
        if(it)href=it[1];
      }
      if(!href){
        const it=opf.match(/<item[^>]*properties=["'][^"']*cover-image[^"']*["'][^>]*href=["']([^"']+)["']/)
              ||opf.match(/<item[^>]*href=["']([^"']+)["'][^>]*properties=["'][^"']*cover-image[^"']*["']/)
              ||opf.match(/<item[^>]*href=["']([^"']+\.(?:jpe?g|png|webp))["'][^>]*id=["'][^"']*cover[^"']*["']/i)
              ||opf.match(/<item[^>]*id=["'][^"']*cover[^"']*["'][^>]*href=["']([^"']+\.(?:jpe?g|png|webp))["']/i);
        if(it)href=it[1];
      }
      if(!href){
        /* último recurso: primeira imagem do zip com "cover" no nome */
        const nomes=Object.keys(zip.files).filter(n=>/cover.*\.(jpe?g|png|webp)$/i.test(n));
        if(nomes.length)href=null,zipDireto=nomes[0];
        var zipDireto=nomes.length?nomes[0]:null;
        if(zipDireto){const f=zip.file(zipDireto);if(f)return await f.async('blob')}
        return null;
      }
      const caminho=decodeURIComponent(dir+href).replace(/^\.\//,'');
      const f=zip.file(caminho)||zip.file(decodeURIComponent(href));
      if(!f)return null;
      return await f.async('blob');
    }
  }catch(e){return null}
}

const nomeStatus={quero:'Quero ler',lendo:'Lendo',lido:'Lido'};
function badgeDe(l){
  if(l.status==='lido')return '<span class="badge lido">lido</span>';
  if(l.status==='lendo')return '<span class="badge lendo">lendo</span>';
  if(l.status==='quero')return '<span class="badge quero">quero ler</span>';

}
function renderChips(){
  const cats=[...new Set(cache.map(l=>(l.categoria||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt-BR'));
  const box=$('#chips');
  if(!cats.length){box.innerHTML='';return}
  let html=`<button class="chip ${filtroCategoria==='__todas__'?'ativo':''}" data-cat="__todas__">Todas</button>`;
  for(const c of cats) html+=`<button class="chip ${filtroCategoria===c?'ativo':''}" data-cat="${c.replace(/"/g,'&quot;')}">${c}</button>`;

  $('#listaCategorias').innerHTML=cats.map(c=>`<option value="${c.replace(/"/g,'&quot;')}">`).join('');

async function render(){
  urlsCapas.forEach(u=>URL.revokeObjectURL(u));urlsCapas=[];
  cache=await listar();
  renderChips();
  const filtro=$('#busca').value.trim().toLowerCase();
  const ordem=$('#ordenar').value;
  const ordStatus={lendo:0,quero:1,lido:2,undefined:3,null:3,'':3};
  let lista=cache.filter(l=>{
    const okBusca=!filtro||l.titulo.toLowerCase().includes(filtro)||(l.autor||'').toLowerCase().includes(filtro);
    const okCat=filtroCategoria==='__todas__'||(l.categoria||'').trim()===filtroCategoria;
    return okBusca&&okCat;
  });
  lista.sort((a,b)=>{
    if(ordem==='titulo')return a.titulo.localeCompare(b.titulo,'pt-BR');
    if(ordem==='autor')return (a.autor||'~').localeCompare(b.autor||'~','pt-BR');
    if(ordem==='status')return (ordStatus[a.status]??3)-(ordStatus[b.status]??3);
    return (b.data||0)-(a.data||0); // recentes
  });
  const el=$('#livros');el.innerHTML='';
  $('#vazio').hidden=cache.length>0;
  for(const l of lista){
    let b;
    const prog = l.progresso?`<div class="barraProg"><i style="width:${Math.round(l.progresso*100)}%"></i></div>`:'';
    if(l.capa){

    }else{
      b=document.createElement('button');
      b.className='lombada';
      b.style.background=`linear-gradient(180deg,${corDe(l.titulo)} 0%,${corDe(l.titulo)} 85%,rgba(0,0,0,.25))`;

      b.innerHTML=`${badgeDe(l)}<span></span><i class="tipo">${l.tipo.toUpperCase()}</i>${prog}`;
      b.querySelector('span').textContent=l.titulo;
    }
    b.onclick=()=>abrirPainel(l);

  }

/* ================= LEITOR DE EPUB ================= */
let ebook=null, rendition=null, leitorLivro=null, fonteLeitor=100;
async function abrirLeitor(l){
  if(l.tipo!=='epub'){return}
  // espera a biblioteca carregar (até ~4s)
  if(!window.ePub){
    avisar('Preparando o leitor…');
    for(let i=0;i<40 && !window.ePub;i++){await new Promise(r=>setTimeout(r,100))}
  }
  if(!window.ePub){avisar('Leitor não carregou — verifique a conexão e tente de novo');return}
  leitorLivro=l;
  $('#veuLivro').classList.remove('aberto');
  $('#leitorTitulo').textContent=l.titulo;
  $('#leitor').hidden=false;
  $('#leitorArea').innerHTML='';
  try{
    const buf=await l.blob.arrayBuffer();
    ebook=ePub(buf);
    rendition=ebook.renderTo('leitorArea',{
      flow:'scrolled-doc',
      manager:'continuous',
      width:'100%',
      height:'100%'
    });
    fonteLeitor=l.fonteLeitor||100;
    aplicarTemaLeitor();
    await rendition.display(l.cfi||undefined);
    await ebook.ready;
    // reforça o tamanho depois de montar (evita tela em branco)
    setTimeout(()=>{try{rendition.resize()}catch(e){}},300);
    try{await ebook.locations.generate(1200)}catch(e){}
    rendition.on('relocated',async loc=>{
      leitorLivro.cfi=loc.start.cfi;
      let pct=0;
      try{pct=ebook.locations.percentageFromCfi(loc.start.cfi)||0}catch(e){}
      leitorLivro.progresso=pct;
      if(pct>0.02 && leitorLivro.status!=='lido')leitorLivro.status='lendo';
      if(pct>=0.985)leitorLivro.status='lido';
      $('#leitorProgresso').textContent=Math.round(pct*100)+'%';
      await salvar(leitorLivro);
    });
  }catch(e){
    avisar('Não consegui abrir este EPUB');
    fecharLeitor();
  }
}
function aplicarTemaLeitor(){
  if(!rendition)return;
  const escuro=$('#leitor').classList.contains('escuro');
  rendition.themes.fontSize(fonteLeitor+'%');
  rendition.themes.override('color', escuro?'#E8E0CF':'#20160B');
  rendition.themes.override('background', escuro?'#14100C':'#F3ECD9');
}
function fecharLeitor(){
  try{if(rendition)rendition.destroy()}catch(e){}
  try{if(ebook)ebook.destroy()}catch(e){}
  rendition=null;ebook=null;
  $('#leitor').hidden=true;
  render();
}
$('#leitorFechar').onclick=fecharLeitor;
$('#leitorProximo').onclick=()=>rendition&&rendition.next();
$('#leitorAnterior').onclick=()=>rendition&&rendition.prev();
$('#leitorMais').onclick=async()=>{fonteLeitor=Math.min(200,fonteLeitor+10);if(leitorLivro){leitorLivro.fonteLeitor=fonteLeitor;await salvar(leitorLivro)}aplicarTemaLeitor()};
$('#leitorMenos').onclick=async()=>{fonteLeitor=Math.max(60,fonteLeitor-10);if(leitorLivro){leitorLivro.fonteLeitor=fonteLeitor;await salvar(leitorLivro)}aplicarTemaLeitor()};
$('#leitorTema').onclick=()=>{$('#leitor').classList.toggle('escuro');aplicarTemaLeitor()};
document.addEventListener('keydown',e=>{
  if($('#leitor').hidden)return;
  if(e.key==='ArrowRight')rendition&&rendition.next();
  if(e.key==='ArrowLeft')rendition&&rendition.prev();
  if(e.key==='Escape')fecharLeitor();
});

/* ================= GOOGLE DRIVE ================= */
let tokenClient=null, tokenAcesso=null, pickerPronto=false;

function driveConfigurado(){
  return GOOGLE_CLIENT_ID && !GOOGLE_CLIENT_ID.startsWith('COLE_AQUI')
      && GOOGLE_API_KEY && !GOOGLE_API_KEY.startsWith('COLE_AQUI');
}
function esperar(cond){
  return new Promise(res=>{
    if(cond())return res();
    const t=setInterval(()=>{if(cond()){clearInterval(t);res()}},80);
  });
}
async function prepararGoogle(){
  await esperar(()=>window._gapiPronto&&window._gisPronto);
  if(!pickerPronto){
    await new Promise(r=>gapi.load('picker',r));
    pickerPronto=true;
  }
  if(!tokenClient){
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:GOOGLE_CLIENT_ID,
      scope:GOOGLE_SCOPE,
      callback:()=>{}
    });
  }
}

$('#btnDrive').onclick=async()=>{
  if(!driveConfigurado()){
    avisar('Falta configurar o Drive — veja o arquivo COMO-CONECTAR-DRIVE');
    return;
  }
  try{
    avisar('Conectando ao Google Drive…');
    await prepararGoogle();
    tokenClient.callback=resp=>{
      if(resp.error){avisar('Não consegui entrar na sua conta Google');return}
      tokenAcesso=resp.access_token;
      abrirPicker();
    };
    tokenClient.requestAccessToken({prompt:tokenAcesso?'':'consent'});
  }catch(e){avisar('Erro ao conectar no Drive')}
};

function abrirPicker(){
  const view=new google.picker.DocsView(google.picker.ViewId.DOCS)
      .setMimeTypes('application/pdf,application/epub+zip')
      .setMode(google.picker.DocsViewMode.LIST)
      .setSelectFolderEnabled(false);
  const picker=new google.picker.PickerBuilder()
      .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
      .setDeveloperKey(GOOGLE_API_KEY)
      .setOAuthToken(tokenAcesso)
      .addView(view)
      .setTitle('Escolha os livros')
      .setCallback(pickerCallback)
      .build();
  picker.setVisible(true);
}

async function pickerCallback(data){
  if(data.action!==google.picker.Action.PICKED)return;
  const docs=data.docs||[];
  let ok=0;
  for(const doc of docs){
    try{
      avisar(`Baixando "${doc.name}"…`);
      const res=await fetch(`https://www.googleapis.com/drive/v3/files/${doc.id}?alt=media`,{
        headers:{Authorization:'Bearer '+tokenAcesso}
      });
      if(!res.ok)throw new Error('download');
      const blob=await res.blob();
      const ehPdf=/pdf/i.test(doc.mimeType)||/\.pdf$/i.test(doc.name);
      const livro={
        titulo:tituloDoArquivo(doc.name),
        autor:'',
        tipo:ehPdf?'pdf':'epub',
        tamanho:blob.size,
        data:Date.now(),
        blob,capa:null,capaTentada:false
      };
      avisar(`Gerando capa de "${livro.titulo}"…`);
      livro.capa=await gerarCapa(livro);
      livro.capaTentada=true;
      await salvar(livro);
      ok++;
    }catch(e){avisar(`Falhou ao importar "${doc.name}"`)}
  }
  await render();
  if(ok)avisar(ok>1?`${ok} livros importados do Drive`:'Livro importado do Drive');
  if(ok)sincronizar(false);
}

/* ================= SINCRONIZAÇÃO (pasta no Drive) ================= */
const PASTA_NOME='Minha Estante';

function pedirToken(interativo){
  return new Promise(async(res,rej)=>{
    await prepararGoogle();
    tokenClient.callback=r=>{
      if(r.error)return rej(r);
      tokenAcesso=r.access_token;res(r.access_token);
    };
    tokenClient.error_callback=e=>rej(e);
    try{
      tokenClient.requestAccessToken({prompt:interativo?(tokenAcesso?'':'consent'):''});
    }catch(e){rej(e)}
  });
}

async function acharOuCriarPasta(token){
  const q=encodeURIComponent(`name='${PASTA_NOME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  let r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&spaces=drive`,{headers:{Authorization:'Bearer '+token}});
  let d=await r.json();
  if(d.files&&d.files.length)return d.files[0].id;
  r=await fetch('https://www.googleapis.com/drive/v3/files?fields=id',{
    method:'POST',
    headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({name:PASTA_NOME,mimeType:'application/vnd.google-apps.folder'})
  });
  d=await r.json();
  return d.id;
}

async function subirParaDrive(token,pastaId,livro){
  const ext=livro.tipo==='pdf'?'.pdf':'.epub';
  const tipoMime=livro.tipo==='pdf'?'application/pdf':'application/epub+zip';
  const nome=livro.titulo.replace(/[\\/:*?"<>|]/g,'')+ext;
  const meta={name:nome,parents:[pastaId],appProperties:{estante:'1'}};
  const boundary='estante'+Date.now()+Math.random().toString(36).slice(2);
  const delim=`\r\n--${boundary}\r\n`;
  const fim=`\r\n--${boundary}--`;
  const cabMeta=delim+'Content-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta);
  const cabMedia=delim+'Content-Type: '+tipoMime+'\r\n\r\n';
  const corpo=new Blob([cabMeta,cabMedia,livro.blob,fim]);
  const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{
    method:'POST',
    headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+boundary},
    body:corpo
  });
  if(!r.ok)throw new Error('upload');
  const d=await r.json();
  return d.id;
}

async function listarDrive(token,pastaId){
  const q=encodeURIComponent(`'${pastaId}' in parents and trashed=false`);
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,size,mimeType)&pageSize=1000`,{headers:{Authorization:'Bearer '+token}});
  const d=await r.json();
  return d.files||[];
}

async function renomearNoDrive(token,driveId,livro){
  const ext=livro.tipo==='pdf'?'.pdf':'.epub';
  const nome=livro.titulo.replace(/[\\/:*?"<>|]/g,'')+ext;
  await fetch(`https://www.googleapis.com/drive/v3/files/${driveId}`,{
    method:'PATCH',
    headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({name:nome})
  });
}
async function lixeiraNoDrive(token,driveId){
  await fetch(`https://www.googleapis.com/drive/v3/files/${driveId}`,{
    method:'PATCH',
    headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({trashed:true})
  });
}

async function sincronizar(interativo){
  if(!driveConfigurado()){
    if(interativo)avisar('Falta configurar o Drive — veja COMO-CONECTAR-DRIVE');
    return;
  }
  const btn=$('#btnSync');
  btn.classList.add('girando');
  try{
    if(interativo)avisar('Sincronizando…');
    const token=await pedirToken(interativo);
    const pastaId=await acharOuCriarPasta(token);

    // 0) manda pra lixeira do Drive o que foi apagado neste aparelho
    const lixo=(await getMeta('lixo'))||[];
    if(lixo.length){
      for(const id of lixo){ try{await lixeiraNoDrive(token,id)}catch(e){} }
      await setMeta('lixo',[]);
    }

    // 1) envia/atualiza os livros locais
    const locais=await listar();
    for(const l of locais){
      if(!l.driveId){
        if(interativo)avisar(`Enviando "${l.titulo}"…`);
        try{
          const id=await subirParaDrive(token,pastaId,l);
          if(id){l.driveId=id;delete l.driveDirty;await salvar(l)}
        }catch(e){}
      }else if(l.driveDirty){
        try{await renomearNoDrive(token,l.driveId,l);delete l.driveDirty;await salvar(l)}catch(e){}
      }
    }

    // 2) baixa os que estão no Drive mas não neste aparelho
    const jaTenho=new Set((await listar()).map(x=>x.driveId).filter(Boolean));
    const remotos=await listarDrive(token,pastaId);
    let baixados=0;
    for(const f of remotos){
      if(jaTenho.has(f.id))continue;
      if(interativo)avisar(`Baixando "${f.name}"…`);
      try{
        const rr=await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`,{headers:{Authorization:'Bearer '+token}});
        if(!rr.ok)continue;
        const blob=await rr.blob();
        const ehPdf=/pdf/i.test(f.mimeType)||/\.pdf$/i.test(f.name);
        const livro={
          titulo:tituloDoArquivo(f.name),autor:'',
          tipo:ehPdf?'pdf':'epub',tamanho:blob.size,
          data:Date.now(),blob,capa:null,capaTentada:false,driveId:f.id
        };
        livro.capa=await gerarCapa(livro);
        livro.capaTentada=true;
        await salvar(livro);
        baixados++;
      }catch(e){}
    }

    await setMeta('ultimaSync',Date.now());
    await render();
    if(interativo)avisar('Estante sincronizada'+(baixados?` · ${baixados} novo(s)`:''));
    else if(baixados)avisar(baixados>1?`${baixados} livros novos de outro aparelho`:'1 livro novo de outro aparelho');
  }catch(e){
    if(interativo)avisar('Não consegui sincronizar — toque de novo pra autorizar');
  }finally{
    btn.classList.remove('girando');
  }
}

$('#btnSync').onclick=()=>sincronizar(true);

/* ================= busca ================= */
$('#busca').oninput=()=>render();

/* ================= init ================= */
(async()=>{
  await abrirDB();
  await render();
  gerarCapasFaltantes(); /* gera capa dos livros antigos em segundo plano */
  if(navigator.storage&&navigator.storage.persist){navigator.storage.persist()}
  if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
  /* tenta sincronizar sozinho ao abrir (silencioso; se precisar de login, ignora) */
  setTimeout(()=>sincronizar(false),1500);
})();
</script>
